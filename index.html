<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Harry Potter AI Living Portrait</title>
    
    <!-- Google Identity Services Library -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background-color: #000;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: Georgia, serif;
      }
      .portrait-container {
        position: relative;
        width: 100vw;
        height: 100vh;
        display: none; /* Hidden until authenticated */
        justify-content: center;
        align-items: center;
        background: #000;
      }
      video {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      /* Activation Overlay to grant browser audio/mic permissions */
      #start-overlay {
        position: absolute;
        z-index: 100;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.85);
        display: none;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        color: #f0c975;
        text-align: center;
        cursor: pointer;
      }
      #start-overlay h1 { font-size: 2rem; margin-bottom: 10px; }
      #start-overlay p { font-size: 1rem; color: #ccc; }

      .voice-indicator {
        position: absolute;
        bottom: 20px;
        right: 20px;
        width: 14px;
        height: 14px;
        background-color: #00ff66;
        border-radius: 50%;
        box-shadow: 0 0 10px #00ff66;
        z-index: 10;
        opacity: 0.8;
      }
      .voice-indicator.thinking {
        background-color: #ffcc00;
        box-shadow: 0 0 12px #ffcc00;
      }
      .voice-indicator.speaking {
        background-color: #00ccff;
        box-shadow: 0 0 12px #00ccff;
      }
    </style>
  </head>
  <body>

    <!-- Touch overlay required by Chrome for wall mounts -->
    <div id="start-overlay" onclick="activateFrame()">
      <h1>⚡ Harry Potter Portrait ⚡</h1>
      <p>Tap anywhere on screen to wake up the portrait voice engine</p>
    </div>

    <div class="portrait-container" id="portrait">
      <video id="sleepingVideo" src="harry_sleeping.mp4" autoplay loop muted playsinline></video>
      <video id="talkingVideo" src="harry_talking.mp4" style="display:none;" loop muted playsinline></video>
      <video id="walkingVideo" src="harry_walking.mp4" style="display:none;" loop muted playsinline></video>

      <div class="voice-indicator" id="indicator" title="Status Indicator"></div>
    </div>

    <script>
      let currentState = 'sleeping';
      let recognition = null;
      let isBusy = false;

      function playState(newState) {
        if (currentState === newState) return;
        const states = ['sleeping', 'talking', 'walking'];
        
        states.forEach((state) => {
          const video = document.getElementById(`${state}Video`);
          if (state === newState) {
            video.style.display = 'block';
            video.currentTime = 0;
            video.play().catch(err => console.log('Playback error:', err));
          } else {
            video.style.display = 'none';
            video.pause();
          }
        });
        currentState = newState;
      }

      // 1. Activate frame on user tap (Bypasses Chrome restrictions)
      function activateFrame() {
        document.getElementById('start-overlay').style.display = 'none';
        document.getElementById('portrait').style.display = 'flex';
        
        // Resume browser audio context
        if ('speechSynthesis' in window) {
          window.speechSynthesis.resume();
          window.speechSynthesis.cancel();
        }

        playState('sleeping');
        startContinuousVoiceControl();
      }

      // 2. Send transcript to AI
      async function askAI(userQuery) {
        isBusy = true;
        const indicator = document.getElementById('indicator');
        indicator.className = 'voice-indicator thinking';

        try {
          const response = await fetch('https://text.pollinations.ai/openai', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              model: 'openai',
              messages: [
                { 
                  role: 'system', 
                  content: 'You are Harry Potter inside a magical living portrait. Keep responses short, witty, and under 2 short sentences.' 
                },
                { role: 'user', content: userQuery }
              ]
            })
          });

          const replyText = await response.text();
          console.log('Harry replies:', replyText);
          speakResponse(replyText);

        } catch (error) {
          console.error('AI Error:', error);
          speakResponse("Mischief managed... my magic seems spotty right now.");
        }
      }

      // 3. Speech Output
      function speakResponse(text) {
        const indicator = document.getElementById('indicator');
        indicator.className = 'voice-indicator speaking';

        if (!('speechSynthesis' in window)) {
          finishSpeech();
          return;
        }

        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.rate = 0.95;

        utterance.onstart = () => playState('talking');
        utterance.onend = finishSpeech;
        utterance.onerror = finishSpeech;

        window.speechSynthesis.speak(utterance);
      }

      function finishSpeech() {
        playState('sleeping');
        document.getElementById('indicator').className = 'voice-indicator';
        isBusy = false;
        restartListening();
      }

      function restartListening() {
        if (!recognition || isBusy) return;
        try {
          recognition.start();
        } catch (e) {}
      }

      // 4. Infinite Microphone Loop
      function startContinuousVoiceControl() {
        if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) return;

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        recognition = new SpeechRecognition();
        
        recognition.continuous = true;
        recognition.interimResults = false;
        recognition.lang = 'en-US';

        recognition.onresult = (event) => {
          if (isBusy) return;

          const lastIndex = event.results.length - 1;
          const transcript = event.results[lastIndex][0].transcript.toLowerCase().trim();
          console.log(' Heard:', transcript);

          if (!transcript) return;

          if (transcript.includes('walk away') || transcript.includes('leave')) {
            playState('walking');
          } else if (transcript.includes('go to sleep')) {
            playState('sleeping');
          } else {
            askAI(transcript);
          }
        };

        recognition.onend = () => {
          if (!isBusy) {
            setTimeout(restartListening, 200);
          }
        };

        recognition.onerror = (e) => {
          if (e.error !== 'aborted' && !isBusy) {
            setTimeout(restartListening, 1000);
          }
        };

        restartListening();
      }

      // 5. Auth Callback
      function initializeGoogleSignIn() {
        const client = google.accounts.oauth2.initTokenClient({
          client_id: '915301130815-alrmn3kdpn0qe9tl8n76md3359qq0te0.apps.googleusercontent.com',
          scope: 'email profile',
          callback: (tokenResponse) => {
            if (tokenResponse && tokenResponse.access_token) {
              // Show touch-to-start overlay after auth completes
              document.getElementById('start-overlay').style.display = 'flex';
            }
          },
        });

        client.requestAccessToken();
      }

      window.onload = () => {
        initializeGoogleSignIn();
      };
    </script>
  </body>
</html>
