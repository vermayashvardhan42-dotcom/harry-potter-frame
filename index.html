<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Harry Potter AI Living Portrait</title>
    
    <!-- Google Identity Services Library -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background-color: #000;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .portrait-container {
        position: relative;
        width: 100vw;
        height: 100vh;
        display: none; /* Hidden until authenticated */
        justify-content: center;
        align-items: center;
        background: #000;
      }
      video {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .voice-indicator {
        position: absolute;
        bottom: 20px;
        right: 20px;
        width: 12px;
        height: 12px;
        background-color: #00ff66;
        border-radius: 50%;
        box-shadow: 0 0 10px #00ff66;
        z-index: 10;
        opacity: 0.6;
        transition: background-color 0.3s ease;
      }
      .voice-indicator.thinking {
        background-color: #ffcc00;
        box-shadow: 0 0 10px #ffcc00;
      }
    </style>
  </head>
  <body>

    <div class="portrait-container" id="portrait">
      <video id="sleepingVideo" src="harry_sleeping.mp4" autoplay loop muted playsinline></video>
      <video id="talkingVideo" src="harry_talking.mp4" style="display:none;" loop muted playsinline></video>
      <video id="walkingVideo" src="harry_walking.mp4" style="display:none;" loop muted playsinline></video>

      <div class="voice-indicator" id="indicator" title="Listening for voice commands..."></div>
    </div>

    <script>
      let currentState = 'sleeping';
      let recognition = null;
      let isSpeaking = false;

      // Switch video states
      function playState(newState) {
        if (currentState === newState) return;
        const states = ['sleeping', 'talking', 'walking'];
        
        states.forEach((state) => {
          const video = document.getElementById(`${state}Video`);
          if (state === newState) {
            video.style.display = 'block';
            video.currentTime = 0;
            video.play().catch(err => console.log('Playback error:', err));
          } else {
            video.style.display = 'none';
            video.pause();
          }
        });
        currentState = newState;
      }

      // Query OpenAI Engine (Keyless via Pollinations proxy)
      async function askOpenAI(userQuery) {
        const indicator = document.getElementById('indicator');
        indicator.classList.add('thinking');

        try {
          const response = await fetch('https://text.pollinations.ai/openai', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              model: 'openai',
              messages: [
                { 
                  role: 'system', 
                  content: 'You are Harry Potter inside a magical living portrait on a wall. Keep responses short, concise, witty, and in-character (maximum 2 sentences).' 
                },
                { role: 'user', content: userQuery }
              ]
            })
          });

          const replyText = await response.text();
          indicator.classList.remove('thinking');
          speakResponse(replyText);

        } catch (error) {
          console.error('AI Error:', error);
          indicator.classList.remove('thinking');
          speakResponse("Mischief managed... my magic seems a bit spotty right now.");
        }
      }

      // Text-To-Speech Output + Sync Video
      function speakResponse(text) {
        if (!('speechSynthesis' in window)) return;

        // Pause speech recognition while Harry speaks
        if (recognition) recognition.stop();
        isSpeaking = true;

        const utterance = new SpeechSynthesisUtterance(text);
        utterance.rate = 0.95; // Slightly slower for clear magical tone
        utterance.pitch = 1.0;

        utterance.onstart = () => {
          playState('talking');
        };

        utterance.onend = () => {
          playState('sleeping');
          isSpeaking = false;
          // Restart voice engine after finishing speech
          if (recognition) recognition.start();
        };

        utterance.onerror = () => {
          playState('sleeping');
          isSpeaking = false;
          if (recognition) recognition.start();
        };

        window.speechSynthesis.speak(utterance);
      }

      // Continuous Voice Recognition Engine
      function startContinuousVoiceControl() {
        if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) return;

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        recognition = new SpeechRecognition();
        
        recognition.continuous = true;
        recognition.interimResults = false;
        recognition.lang = 'en-US';

        recognition.onresult = (event) => {
          if (isSpeaking) return;

          const lastResultIndex = event.results.length - 1;
          const transcript = event.results[lastResultIndex][0].transcript.toLowerCase().trim();
          console.log('User said:', transcript);

          // Direct physical movement commands
          if (transcript.includes('walk away') || transcript.includes('leave room')) {
            playState('walking');
          } else if (transcript.includes('go to sleep') || transcript.includes('wake up')) {
            playState('sleeping');
          } else {
            // Send questions/conversations to AI
            askOpenAI(transcript);
          }
        };

        recognition.onend = () => {
          if (!isSpeaking) {
            recognition.start();
          }
        };

        recognition.onerror = (event) => {
          if (event.error !== 'aborted' && !isSpeaking) {
            setTimeout(() => recognition.start(), 1000);
          }
        };

        recognition.start();
      }

      // Google OAuth Initialization
      function initializeGoogleSignIn() {
        const client = google.accounts.oauth2.initTokenClient({
          client_id: '915301130815-alrmn3kdpn0qe9tl8n76md3359qq0te0.apps.googleusercontent.com',
          scope: 'email profile',
          callback: (tokenResponse) => {
            if (tokenResponse && tokenResponse.access_token) {
              const container = document.getElementById('portrait');
              container.style.display = 'flex';
              
              playState('sleeping');
              startContinuousVoiceControl();
            }
          },
        });

        client.requestAccessToken();
      }

      window.onload = () => {
        initializeGoogleSignIn();
      };
    </script>
  </body>
</html>
