<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Harry Potter AI Living Portrait</title>
    
    <!-- Google Identity Services Library -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background-color: #000;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .portrait-container {
        position: relative;
        width: 100vw;
        height: 100vh;
        display: none; /* Hidden until authenticated */
        justify-content: center;
        align-items: center;
        background: #000;
      }
      video {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .voice-indicator {
        position: absolute;
        bottom: 20px;
        right: 20px;
        width: 14px;
        height: 14px;
        background-color: #00ff66;
        border-radius: 50%;
        box-shadow: 0 0 10px #00ff66;
        z-index: 10;
        opacity: 0.8;
        transition: all 0.3s ease;
      }
      .voice-indicator.thinking {
        background-color: #ffcc00;
        box-shadow: 0 0 12px #ffcc00;
      }
      .voice-indicator.speaking {
        background-color: #00ccff;
        box-shadow: 0 0 12px #00ccff;
      }
    </style>
  </head>
  <body>

    <div class="portrait-container" id="portrait">
      <video id="sleepingVideo" src="harry_sleeping.mp4" autoplay loop muted playsinline></video>
      <video id="talkingVideo" src="harry_talking.mp4" style="display:none;" loop muted playsinline></video>
      <video id="walkingVideo" src="harry_walking.mp4" style="display:none;" loop muted playsinline></video>

      <div class="voice-indicator" id="indicator" title="Status Indicator"></div>
    </div>

    <script>
      let currentState = 'sleeping';
      let recognition = null;
      let isProcessingOrSpeaking = false;

      // Switch video states
      function playState(newState) {
        if (currentState === newState) return;
        const states = ['sleeping', 'talking', 'walking'];
        
        states.forEach((state) => {
          const video = document.getElementById(`${state}Video`);
          if (state === newState) {
            video.style.display = 'block';
            video.currentTime = 0;
            video.play().catch(err => console.log('Playback error:', err));
          } else {
            video.style.display = 'none';
            video.pause();
          }
        });
        currentState = newState;
      }

      // Query AI Engine
      async function askAI(userQuery) {
        isProcessingOrSpeaking = true;
        const indicator = document.getElementById('indicator');
        indicator.className = 'voice-indicator thinking';

        try {
          const response = await fetch('https://text.pollinations.ai/openai', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              model: 'openai',
              messages: [
                { 
                  role: 'system', 
                  content: 'You are Harry Potter inside a magical living portrait. Keep responses short, witty, and in-character (maximum 2 short sentences).' 
                },
                { role: 'user', content: userQuery }
              ]
            })
          });

          const replyText = await response.text();
          console.log('Harry replies:', replyText);
          speakResponse(replyText);

        } catch (error) {
          console.error('AI Error:', error);
          speakResponse("Mischief managed... my magic seems a bit spotty right now.");
        }
      }

      // Text-To-Speech Output + Sync Video
      function speakResponse(text) {
        if (!('speechSynthesis' in window)) {
          restartListening();
          return;
        }

        const indicator = document.getElementById('indicator');
        indicator.className = 'voice-indicator speaking';

        // Clear any stuck synthesis queues in browser
        window.speechSynthesis.cancel();

        const utterance = new SpeechSynthesisUtterance(text);
        utterance.rate = 0.95;
        utterance.pitch = 1.0;

        // Try selecting an English voice
        const voices = window.speechSynthesis.getVoices();
        const englishVoice = voices.find(v => v.lang.startsWith('en')) || voices[0];
        if (englishVoice) utterance.voice = englishVoice;

        utterance.onstart = () => {
          playState('talking');
        };

        const onFinishSpeech = () => {
          playState('sleeping');
          indicator.className = 'voice-indicator';
          isProcessingOrSpeaking = false;
          restartListening();
        };

        utterance.onend = onFinishSpeech;
        utterance.onerror = (err) => {
          console.error('Speech synthesis error:', err);
          onFinishSpeech();
        };

        window.speechSynthesis.speak(utterance);
      }

      // Restart mic loop cleanly
      function restartListening() {
        if (!recognition) return;
        try {
          recognition.start();
        } catch (e) {
          // Listener is already running
        }
      }

      // Continuous Voice Recognition Engine
      function startContinuousVoiceControl() {
        if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
          console.error('Speech recognition not supported in this browser.');
          return;
        }

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        recognition = new SpeechRecognition();
        
        recognition.continuous = true;
        recognition.interimResults = false;
        recognition.lang = 'en-US';

        recognition.onresult = (event) => {
          if (isProcessingOrSpeaking) return;

          const lastResultIndex = event.results.length - 1;
          const transcript = event.results[lastResultIndex][0].transcript.toLowerCase().trim();
          console.log('User said:', transcript);

          if (!transcript) return;

          // Direct physical movement commands
          if (transcript.includes('walk away') || transcript.includes('leave room')) {
            playState('walking');
          } else if (transcript.includes('go to sleep')) {
            playState('sleeping');
          } else {
            // Send questions/conversations to AI
            recognition.stop(); // Pause mic while AI thinks and speaks
            askAI(transcript);
          }
        };

        recognition.onend = () => {
          // If mic drops naturally and we aren't speaking/thinking, restart immediately
          if (!isProcessingOrSpeaking) {
            setTimeout(() => restartListening(), 300);
          }
        };

        recognition.onerror = (event) => {
          console.warn('Speech recognition error:', event.error);
          if (event.error !== 'aborted' && !isProcessingOrSpeaking) {
            setTimeout(() => restartListening(), 1000);
          }
        };

        restartListening();
      }

      // Google OAuth Initialization
      function initializeGoogleSignIn() {
        const client = google.accounts.oauth2.initTokenClient({
          client_id: '915301130815-alrmn3kdpn0qe9tl8n76md3359qq0te0.apps.googleusercontent.com',
          scope: 'email profile',
          callback: (tokenResponse) => {
            if (tokenResponse && tokenResponse.access_token) {
              const container = document.getElementById('portrait');
              container.style.display = 'flex';
              
              playState('sleeping');
              startContinuousVoiceControl();
            }
          },
        });

        client.requestAccessToken();
      }

      window.onload = () => {
        // Pre-load synthesis voices
        if ('speechSynthesis' in window) {
          window.speechSynthesis.onvoiceschanged = () => {
            window.speechSynthesis.getVoices();
          };
        }
        initializeGoogleSignIn();
      };
    </script>
  </body>
</html>
