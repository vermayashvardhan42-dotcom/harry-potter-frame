<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Harry Potter Frame</title>
  <style>
    body, html { 
      margin: 0; padding: 0; background: #000; overflow: hidden; height: 100vh; width: 100vw; 
      display: flex; justify-content: center; align-items: center; color: white; font-family: sans-serif;
    }
    video { 
      width: 100%; height: 100%; object-fit: cover; position: absolute; top:0; left:0; z-index: 1; 
      opacity: 0; transition: opacity 0.3s ease;
    }
    video.active { opacity: 1; z-index: 2; }
    #tapOverlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      z-index: 10; cursor: pointer;
    }
    #statusText {
      z-index: 20; background: rgba(0,0,0,0.75); padding: 12px 20px; border-radius: 8px; text-align: center;
      border: 1px solid #ffd700; pointer-events: none; position: absolute; bottom: 30px; font-size: 14px;
    }
  </style>
</head>
<body>

  <div id="statusText">✨ Tap Anywhere to Wake Harry ✨</div>
  <div id="tapOverlay"></div>

  <video id="vSleeping" class="active" autoplay loop muted playsinline webkit-playsinline>
    <source src="harry_sleeping.mp4" type="video/mp4">
  </video>
  <video id="vWaking" muted playsinline webkit-playsinline preload="auto">
    <source src="harry_waking.mp4" type="video/mp4">
  </video>
  <video id="vTalking" loop muted playsinline webkit-playsinline preload="auto">
    <source src="harry_talking.mp4" type="video/mp4">
  </video>

  <script>
    const vSleeping = document.getElementById('vSleeping');
    const vWaking = document.getElementById('vWaking');
    const vTalking = document.getElementById('vTalking');
    const overlay = document.getElementById('tapOverlay');
    const statusText = document.getElementById('statusText');

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition;

    if (SpeechRecognition) {
      recognition = new SpeechRecognition();
      recognition.lang = 'en-US';
      recognition.interimResults = false;
    }

    function showVideo(targetVideo) {
      [vSleeping, vWaking, vTalking].forEach(v => {
        if (v === targetVideo) {
          v.classList.add('active');
          v.play().catch(() => {});
        } else {
          v.classList.remove('active');
          v.pause();
        }
      });
    }

    overlay.addEventListener('click', () => {
      statusText.innerText = "⚡ Harry is waking up...";
      startInteraction();
    });

    function startInteraction() {
      // 1. Play waking video
      vWaking.currentTime = 0;
      showVideo(vWaking);

      // 2. When waking video finishes, switch to talking & start listening
      vWaking.onended = () => {
        showVideo(vTalking);
        statusText.innerText = "🎙️ Listening... Speak your question!";

        if (recognition) {
          try {
            recognition.start();
          } catch(e) {
            console.log("Recognition already active");
          }
        } else {
          statusText.innerText = "Speech Recognition not supported on this browser.";
        }
      };
    }

    if (recognition) {
      recognition.onresult = async (event) => {
        const userCommand = event.results[0][0].transcript;
        statusText.innerText = `You asked: "${userCommand}"\nThinking...`;
        
        const reply = await getHarryResponse(userCommand);
        statusText.innerText = `Harry: "${reply}"`;

        const speech = new SpeechSynthesisUtterance(reply);
        speech.rate = 1.0;
        speech.pitch = 1.1;

        speech.onend = () => {
          statusText.innerText = "✨ Tap Anywhere to Wake Harry ✨";
          showVideo(vSleeping);
        };

        window.speechSynthesis.speak(speech);
      };

      recognition.onerror = () => {
        statusText.innerText = "Didn't catch that. Tap again!";
        showVideo(vSleeping);
      };
    }

    async function getHarryResponse(promptText) {
      // PASTE YOUR GEMINI API KEY BELOW IF YOU HAVE ONE
      const apiKey = "YOUR_GEMINI_API_KEY_HERE"; 
      
      if (apiKey === "YOUR_GEMINI_API_KEY_HERE") {
        return "Hello! I am Harry Potter. Add your Gemini API key in index.html to ask me anything!";
      }

      const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;

      try {
        const response = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contents: [{ parts: [{ text: `You are Harry Potter inside a living portrait. Answer in 1 short sentence: "${promptText}"` }] }]
          })
        });
        const data = await response.json();
        return data.candidates[0].content.parts[0].text;
      } catch (error) {
        return "Blimey! My magic seems to be acting up right now.";
      }
    }
  </script>
</body>
</html>
