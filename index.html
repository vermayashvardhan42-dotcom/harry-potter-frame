<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Harry Potter Living Portrait</title>
    
    <!-- Google Identity Services Library -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background-color: #0d0d0d;
        font-family: 'Georgia', serif;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .portrait-container {
        position: relative;
        width: 100vw;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #000;
      }
      video {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
    </style>
  </head>
  <body>
    <div class="portrait-container">
      <!-- अपने वीडियो एलिमेंट्स (Harry_sleeping.mp4, Harry_talking.mp4 आदि) यहाँ रखें -->
    </div>

    <script>
      // Google OAuth Token Client इनिशियलाइज़ करने का फ़ंक्शन
      function initializeGoogleSignIn() {
        const client = google.accounts.oauth2.initTokenClient({
          client_id: 'YOUR_CLIENT_ID_HERE.apps.googleusercontent.com', // यहाँ अपनी कॉपी की हुई Client ID डालें
          scope: 'email profile',
          callback: (tokenResponse) => {
            if (tokenResponse && tokenResponse.access_token) {
              console.log('Access token received:', tokenResponse.access_token);
              // यहाँ आप टोकन का उपयोग करके Google APIs को कॉल कर सकते हैं
            }
          },
        });

        // ऑथेंटिकेशन रिक्वेस्ट ट्रिगर करें
        client.requestAccessToken();
      }

      window.onload = () => {
        initializeGoogleSignIn();
      };
    </script>
  </body>
</html>
