<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Harry Potter Frame</title>
  <style>
    body, html { 
      margin: 0; padding: 0; background: #000; overflow: hidden; height: 100vh; width: 100vw; 
      display: flex; justify-content: center; align-items: center; color: white; font-family: sans-serif;
    }
    video { 
      width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; 
      opacity: 0; transition: opacity 0.2s ease; z-index: 1;
    }
    video.active { opacity: 1; z-index: 2; }
    #tapOverlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      z-index: 10; cursor: pointer;
    }
    #statusText {
      z-index: 20; background: rgba(0, 0, 0, 0.85); padding: 12px 20px; border-radius: 8px; text-align: center;
      border: 1px solid #ffd700; pointer-events: none; position: absolute; bottom: 30px; font-size: 14px;
    }
  </style>
</head>
<body>

  <div id="statusText">✨ Tap Anywhere to Talk to Harry ✨</div>
  <div id="tapOverlay"></div>

  <video id="vSleeping" class="active" autoplay loop muted playsinline webkit-playsinline preload="auto">
    <source src="harry_sleeping.mp4" type="video/mp4">
  </video>

  <video id="vTalking" loop muted playsinline webkit-playsinline preload="auto">
    <source src="harry_talking.mp4" type="video/mp4">
  </video>

  <script>
    const vSleeping = document.getElementById('vSleeping');
    const vTalking = document.getElementById('vTalking');
    const overlay = document.getElementById('tapOverlay');
    const statusText = document.getElementById('statusText');

    let isUnlocked = false;

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition;

    if (SpeechRecognition) {
      recognition = new SpeechRecognition();
      recognition.lang = 'en-US';
      recognition.interimResults = false;
    }

    function switchVideo(target) {
      if (target === vTalking) {
        vSleeping.classList.remove('active');
        vTalking.classList.add('active');
        vTalking.play().catch(e => console.log(e));
      } else {
        vTalking.classList.remove('active');
        vSleeping.classList.add('active');
        vSleeping.play().catch(e => console.log(e));
      }
    }

    overlay.addEventListener('click', async () => {
      // Step 1: Unlock video elements for iOS context
      if (!isUnlocked) {
        try {
          await vSleeping.play();
          await vTalking.play();
          vTalking.pause();
          isUnlocked = true;
        } catch (err) {
          console.log("Video unlock note:", err);
        }
      }

      // Warm up text-to-speech engine
      window.speechSynthesis.speak(new SpeechSynthesisUtterance(''));

      // Switch to talking loop immediately
      switchVideo(vTalking);
      statusText.innerText = "🎙️ Listening... Speak your question now!";

      // Start speech recognition safely
      if (recognition) {
        try {
          recognition.start();
        } catch(e) {
          console.log("Recognition already active");
        }
      } else {
        statusText.innerText = "Speech recognition not supported on this browser.";
      }
    });

    if (recognition) {
      recognition.onresult = async (event) => {
        const userCommand = event.results[0][0].transcript;
        statusText.innerText = `You: "${userCommand}"\nHarry is thinking...`;
        
        const reply = await getHarryResponse(userCommand);
        statusText.innerText = `Harry: "${reply}"`;

        const speech = new SpeechSynthesisUtterance(reply);
        speech.rate = 1.0;
        speech.pitch = 1.1;

        speech.onend = () => {
          statusText.innerText = "✨ Tap Anywhere to Talk to Harry ✨";
          switchVideo(vSleeping);
        };

        window.speechSynthesis.speak(speech);
      };

      recognition.onerror = () => {
        statusText.innerText = "Didn't catch that. Tap to try again!";
        switchVideo(vSleeping);
      };
    }

    async function getHarryResponse(promptText) {
      // PASTE YOUR AQ... API KEY HERE
      const apiKey = "AQ.Ab8RN6KTm--Wle238xp6tOvMm-MsMaSar7SA2D3lrH2iUxGWSA"; 
      
      if (apiKey === "YOUR_GEMINI_API_KEY_HERE") {
        return "Hello! I am Harry Potter. Paste your Gemini API key inside index.html!";
      }

      const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;

      try {
        const response = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contents: [
              {
                parts: [
                  { text: `You are Harry Potter inside a living portrait. Speak directly as Harry and respond in 1 short sentence: "${promptText}"` }
                ]
              }
            ]
          })
        });

        const data = await response.json();

        // Safe response parsing for Gemini 2.5 Flash payload
        if (data && data.candidates && data.candidates[0].content && data.candidates[0].content.parts) {
          // Grab the last part in case 'thinking' steps are included in initial parts
          const parts = data.candidates[0].content.parts;
          const textPart = parts[parts.length - 1].text;
          return textPart.trim();
        } else {
          return "Blimey! My portrait magic is acting up.";
        }
      } catch (error) {
        return "Blimey! My portrait magic seems to be acting up right now.";
      }
    }
  </script>
</body>
</html>
