<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Harry Potter Living Portrait</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body, html {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #000;
      font-family: 'Georgia', serif;
    }

    .portrait-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      transition: opacity 0.4s ease-in-out;
      pointer-events: none;
    }

    video.active {
      opacity: 1;
    }

    #status-overlay {
      position: absolute;
      bottom: 40px;
      z-index: 10;
      padding: 12px 24px;
      font-size: 16px;
      font-weight: bold;
      color: #ffd700;
      background: rgba(0, 0, 0, 0.75);
      border: 2px solid #ffd700;
      border-radius: 25px;
      box-shadow: 0 0 15px rgba(255, 215, 0, 0.3);
      backdrop-filter: blur(5px);
      text-align: center;
      pointer-events: auto;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="portrait-container">
    <video id="vid-sleeping" src="harry_sleeping.mp4" loop muted playsinline class="active"></video>
    <video id="vid-waking" src="harry_waking.mp4" muted playsinline></video>
    <video id="vid-talking" src="harry_talking.mp4" loop muted playsinline></video>

    <div id="status-overlay">✨ Tap once to awaken Harry ✨</div>
  </div>

  <script>
    // DOM Elements
    const sleepingVid = document.getElementById("vid-sleeping");
    const wakingVid = document.getElementById("vid-waking");
    const talkingVid = document.getElementById("vid-talking");
    const statusText = document.getElementById("status-overlay");

    let isStarted = false;
    let recognition = null;

    // Local in-character responses (No API required)
    const HARRY_RESPONSES = [
      "I am Harry Potter. Welcome to Hogwarts!",
      "Mind the moving staircases, they like to change!",
      "Have you seen Hedwig around? She should be returning from the owlery.",
      "Mischief managed! Always keep your wand at the ready.",
      "Beware of the Whomping Willow if you're wandering near the grounds.",
      "Dumbledore always said that words are our most inexhaustible source of magic.",
      "If you're looking for Gryffindor common room, the password is 'Caput Draconis'."
    ];

    // Helper: Pick a random reply
    function getHarryReply() {
      const index = Math.floor(Math.random() * HARRY_RESPONSES.length);
      return HARRY_RESPONSES[index];
    }

    // Switch video state cleanly
    function setPortraitState(state) {
      sleepingVid.classList.remove("active");
      wakingVid.classList.remove("active");
      talkingVid.classList.remove("active");

      if (state === "sleeping") {
        sleepingVid.classList.add("active");
        sleepingVid.play().catch(() => {});
      } else if (state === "waking") {
        wakingVid.classList.add("active");
        wakingVid.currentTime = 0;
        wakingVid.play().catch(() => {});
      } else if (state === "talking") {
        talkingVid.classList.add("active");
        talkingVid.play().catch(() => {});
      }
    }

    // Initial tap to unlock browser audio/video restrictions
    document.body.addEventListener("click", () => {
      if (!isStarted) {
        isStarted = true;
        
        // Start sleeping loop
        sleepingVid.play().catch(() => {});
        wakingVid.load();
        talkingVid.load();

        statusText.innerText = "🎙️ Listening... Speak to Harry!";
        initSpeechRecognition();
      }
    });

    // Web Speech API - Recognition Setup
    function initSpeechRecognition() {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

      if (!SpeechRecognition) {
        statusText.innerText = "Speech API not supported in this browser.";
        return;
      }

      recognition = new SpeechRecognition();
      recognition.lang = "en-US";
      recognition.continuous = true;
      recognition.interimResults = false;

      recognition.onstart = () => {
        setPortraitState("waking");
        statusText.innerText = "🎙️ Listening...";
      };

      recognition.onresult = (event) => {
        const transcript = event.results[event.results.length - 1][0].transcript;
        statusText.innerText = `You asked: "${transcript}"`;
        
        // Process reply
        respondAsHarry();
      };

      recognition.onerror = () => {
        // Automatically restart listening on error
        setTimeout(() => {
          try { recognition.start(); } catch(e) {}
        }, 1000);
      };

      recognition.onend = () => {
        // Auto-restart loop to keep it hands-free
        if (isStarted) {
          try { recognition.start(); } catch(e) {}
        }
      };

      try {
        recognition.start();
      } catch(e) {}
    }

    // Speak response & animate portrait
    function respondAsHarry() {
      window.speechSynthesis.cancel();

      const reply = getHarryReply();
      const utterance = new SpeechSynthesisUtterance(reply);
      utterance.rate = 0.95;
      utterance.pitch = 1.0;

      utterance.onstart = () => {
        setPortraitState("talking");
        statusText.innerText = `🗣️ "${reply}"`;
      };

      utterance.onend = () => {
        setPortraitState("sleeping");
        statusText.innerText = "🎙️ Listening...";
      };

      utterance.onerror = () => {
        setPortraitState("sleeping");
        statusText.innerText = "🎙️ Listening...";
      };

      window.speechSynthesis.speak(utterance);
    }
  </script>
</body>
</html>
