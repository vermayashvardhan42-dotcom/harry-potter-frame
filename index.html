<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Harry Potter Living Portrait</title>
    
    <!-- Google Identity Services Library -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background-color: #0d0d0d;
        font-family: 'Georgia', serif;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .portrait-container {
        position: relative;
        width: 100vw;
        height: 100vh;
        display: none; /* Hidden until authenticated */
        justify-content: center;
        align-items: center;
        background: #000;
      }
      video {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
    </style>
  </head>
  <body>
    <div class="portrait-container" id="portrait">
      <!-- Your media files -->
      <video id="sleepingVideo" src="Harry_sleeping.mp4" autoplay loop muted playsinline></video>
      <video id="talkingVideo" src="Harry_talking.mp4" style="display:none;" loop muted playsinline></video>
      <video id="walkingVideo" src="Harry_walking.mp4" style="display:none;" loop muted playsinline></video>
    </div>

    <script>
      function initializeGoogleSignIn() {
        const client = google.accounts.oauth2.initTokenClient({
          client_id: '915301138815-a1rmckdqpn9r136tm2355qaq4tek.apps.googleusercontent.com',
          scope: 'email profile',
          callback: (tokenResponse) => {
            if (tokenResponse && tokenResponse.access_token) {
              console.log('Authentication successful!');
              
              // Unhide the video container and start video playback
              const container = document.getElementById('portrait');
              container.style.display = 'flex';
              
              const sleepingVideo = document.getElementById('sleepingVideo');
              sleepingVideo.play().catch(err => console.log('Autoplay blocked:', err));
            }
          },
        });

        client.requestAccessToken();
      }

      window.onload = () => {
        initializeGoogleSignIn();
      };
    </script>
  </body>
</html>
